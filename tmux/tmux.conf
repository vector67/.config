set-option -g default-shell /bin/zsh

set -g default-terminal "screen-256color"

# Prefix: backtick (double-tap `` for a literal backtick)
unbind C-b
set -g prefix `
bind ` send-prefix

unbind %
bind ! split-window -h

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Dvorak right-hand home row + below for window switching
bind h select-window -t :0
bind t select-window -t :1
bind n select-window -t :2
bind s select-window -t :3
bind b select-window -t :4
bind m select-window -t :5
bind w select-window -t :6
bind v select-window -t :7

set -g renumber-windows on
set -g allow-rename off
set -g automatic-rename off
set -g mouse on
set -g focus-events on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse

# Two-row status bar: windows 0-3 on top, 4-7 on bottom
set -g status 2

# Map window index to its Dvorak keybind letter
KEY_LETTER="#{?#{e|==:#{window_index},0},h,#{?#{e|==:#{window_index},1},t,#{?#{e|==:#{window_index},2},n,#{?#{e|==:#{window_index},3},s,#{?#{e|==:#{window_index},4},b,#{?#{e|==:#{window_index},5},m,#{?#{e|==:#{window_index},6},w,#{?#{e|==:#{window_index},7},v,?}}}}}}}}"

# Row 1: windows 0-3 (home row: h t n s)
set -g status-justify centre
set -g status-left ""
set -g status-right ""
set -g window-status-separator "  "
set -g window-status-format "#{?#{e|<:#{window_index},4}, ${KEY_LETTER}:#W ,}"
set -g window-status-current-format "#{?#{e|<:#{window_index},4}, ${KEY_LETTER}:#W ,}"

# Row 2: windows 4-7 (below row: b m w v)
set -g status-format[1] "#[align=centre]#{W:#{?#{e|>=:#{window_index},4},  ${KEY_LETTER}:#W  ,},#{?#{e|>=:#{window_index},4},  ${KEY_LETTER}:#W  ,}}"

# Apply solarized theme matching system appearance (on reload and focus)
run-shell "~/.config/tmux/theme.sh"
set-hook -g client-focus-in "run-shell ~/.config/tmux/theme.sh"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
# Initialize tpm (keep this at the bottom)
run '~/.config/tmux/tpm/tpm'
